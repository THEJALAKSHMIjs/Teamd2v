<!DOCTYPE html>
<html>

<head>

<title>Hotels</title>

<link rel="stylesheet" href="style.css">

<style>

.property-container{
max-width:1100px;
margin:auto;
padding:40px;
text-align:center;
}

.category-title{
margin-top:40px;
font-size:26px;
}

.property-images{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.property-images img{
width:300px;
height:220px;
object-fit:cover;
margin:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.property-images img:hover{
transform:scale(1.05);
}

.back-btn{
margin-top:40px;
padding:15px 40px;
font-size:18px;
background:#e4be25;
border:none;
cursor:pointer;
}

/* FULLSCREEN VIEWER */

#fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
}

#fullscreen img{
max-width:90%;
max-height:85%;
border-radius:6px;
}

/* CLOSE BUTTON */

.close-btn{
position:absolute;
top:25px;
right:35px;
font-size:35px;
color:white;
cursor:pointer;
font-weight:bold;
}

/* NAVIGATION */

.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:60px;
color:white;
cursor:pointer;
padding:10px 20px;
user-select:none;
}

.prev{
left:20px;
}

.next{
right:20px;
}

/* IMAGE COUNTER */

.counter{
color:white;
margin-top:15px;
font-size:18px;
}

</style>

</head>


<body>

<div class="property-container">

<h1 id="hotelTitle"></h1>

<div id="images"></div>

<button class="back-btn" onclick="goBack()">Back</button>

</div>


<!-- FULLSCREEN VIEWER -->

<div id="fullscreen">

<span class="close-btn" onclick="closeFullscreen()">✕</span>

<div class="nav-btn prev" onclick="prevImage()">❮</div>

<img id="fullImg">

<div class="nav-btn next" onclick="nextImage()">❯</div>

<div class="counter" id="counter"></div>

</div>



<script>

const params = new URLSearchParams(window.location.search)
const hotel = params.get("name")

const title = document.getElementById("hotelTitle")
const images = document.getElementById("images")

const fullscreen = document.getElementById("fullscreen")
const fullImg = document.getElementById("fullImg")
const counter = document.getElementById("counter")

let currentImages = []
let currentIndex = 0


const hotelData = {

central:{
title:"Central Hotel by D2V",
images:Array.from({length:57},(_,i)=>`images/cen/c${i+1}.jpeg`)
},

amaravati:{
title:"Hotel Amaravati by D2V",
images:Array.from({length:48},(_,i)=>`images/am/am${i+1}.jpeg`)
},

dana:{
title:"Dana Residency (Thammanam)",
categories:{

deluxe:Array.from({length:6},(_,i)=>`images/dana/deluxe/d${i+1}.jpeg`),

executive:Array.from({length:15},(_,i)=>`images/dana/executive/e${i+1}.jpeg`),

suite:Array.from({length:15},(_,i)=>`images/dana/suite/s${i+1}.jpeg`)

}
},

palm:{
title:"Palm Grove by D2V (Edappally)",
categories:{

oak:Array.from({length:18},(_,i)=>`images/palm/p${i+1}.jpeg`),

mahogany:Array.from({length:50},(_,i)=>`images/palm/mahogany/m${i+1}.jpeg`)

}
},

zoot:{
title:"Zoot Kochi Infopark (Kakkanad)",
images:Array.from({length:47},(_,i)=>`images/zoot/z${i+1}.jpeg`)
},

saaaj:{
title:"Hotel Saaaj (Kalamassery)",
categories:{

standard:Array.from({length:5},(_,i)=>`images/saaaj/standard/s${i+1}.jpeg`),

family:Array.from({length:7},(_,i)=>`images/saaaj/family/f${i+1}.jpeg`),

deluxe:Array.from({length:10},(_,i)=>`images/saaaj/deluxe/d${i+1}.jpeg`),

bhk2:Array.from({length:10},(_,i)=>`images/saaaj/2bhk/b${i+1}.jpeg`)

}
}

}


const selectedHotel = hotelData[hotel]

title.innerText = selectedHotel.title


function createImage(src,index,list){

const img = document.createElement("img")

img.src = src
img.loading="lazy"
img.decoding="async"

img.onclick = ()=>{
currentImages = list
currentIndex = index
openFullscreen()
}

return img

}


function openFullscreen(){

fullImg.src = currentImages[currentIndex]

counter.innerText = (currentIndex+1) + " / " + currentImages.length

fullscreen.style.display="flex"

}


function closeFullscreen(){
fullscreen.style.display="none"
}


function nextImage(){

currentIndex = (currentIndex+1) % currentImages.length

openFullscreen()

}


function prevImage(){

currentIndex = (currentIndex-1 + currentImages.length) % currentImages.length

openFullscreen()

}


/* KEYBOARD CONTROLS */

document.addEventListener("keydown",function(e){

if(fullscreen.style.display==="flex"){

if(e.key==="ArrowRight") nextImage()

if(e.key==="ArrowLeft") prevImage()

if(e.key==="Escape") closeFullscreen()

}

})


/* NORMAL HOTELS */

if(selectedHotel.images){

const gallery=document.createElement("div")

gallery.className="property-images"

selectedHotel.images.forEach((img,i)=>{

const image=createImage(img,i,selectedHotel.images)

if(i<4){
const preload=new Image()
preload.src=img
}

gallery.appendChild(image)

})

images.appendChild(gallery)

}


/* CATEGORY HOTELS */

if(selectedHotel.categories){

Object.entries(selectedHotel.categories).forEach(([category,imgs])=>{

const categoryTitle=document.createElement("h2")

categoryTitle.className="category-title"

if(category==="oak"){
categoryTitle.innerText="OAK ROOM"
}

else if(category==="mahogany"){
categoryTitle.innerText="Mahogany (2BHK Appartment)"
}

else{
categoryTitle.innerText=category.toUpperCase()
}

images.appendChild(categoryTitle)


const gallery=document.createElement("div")

gallery.className="property-images"


imgs.forEach((img,i)=>{

const image=createImage(img,i,imgs)

if(i<3){
const preload=new Image()
preload.src=img
}

gallery.appendChild(image)

})

images.appendChild(gallery)

})

}


function goBack(){

const params = new URLSearchParams(window.location.search)

const hotel = params.get("name")

window.location.href="index.html?open=hotel&hotel="+hotel

}

</script>

</body>
</html>
