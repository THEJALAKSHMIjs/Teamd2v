<!DOCTYPE html>
<html>

<head>

<title>StayClub Property</title>

<link rel="stylesheet" href="style.css">

<style>

.property-container{
max-width:1100px;
margin:auto;
padding:40px;
text-align:center;
}

.property-images{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.property-images img{
width:100%;
height:220px;
object-fit:cover;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.sc-btn{
margin-top:40px;
padding:15px 40px;
font-size:18px;
background:#e4be25;
border:none;
cursor:pointer;
}

</style>

</head>


<body>

<div class="property-container">

<h1 id="propertyTitle"></h1>

<div id="images" class="property-images"></div>

<button onclick="goBack()" class="sc-btn">Back</button>

</div>


<script>

const params = new URLSearchParams(window.location.search)
const property = params.get("name")

const title = document.getElementById("propertyTitle")
const images = document.getElementById("images")

const propertyData = {

river:{
title:"River Vill'e (Edappally)",
images: Array.from({length:30}, (_,i)=>`images/river/r${i+1}.jpeg`)
},

luna:{
title:"Luna Nest (Edappally)",
images: Array.from({length:17}, (_,i)=>`images/luna/l${i+1}.jpeg`)
},

tranquil:{
title:"Tranquil (Edakochi)",
images: Array.from({length:42}, (_,i)=>`images/tranquil/t${i+1}.jpeg`)
},

woody:{
title:"Woody & Co (Coonoor)",
images: Array.from({length:27}, (_,i)=>`images/woody/w${i+1}.jpeg`)
},

container:{
title:"Container Home (Coonoor)",
images: Array.from({length:39}, (_,i)=>`images/container/c${i+1}.jpeg`)
},

yrt:{
title:"YRT Paradise (Coonoor)",
images: Array.from({length:42}, (_,i)=>`images/yrt/y${i+1}.jpeg`)
},

hillheaven:{
title:"Hill Heaven (Kothagiri)",
images: Array.from({length:23}, (_,i)=>`images/hill/h${i+1}.jpeg`)
},

littlehome:{
title:"Little Home (Ooty)",
images: Array.from({length:30}, (_,i)=>`images/little/l${i+1}.jpeg`)
},

mist:{
title:"Mist'e Munnar (Munnar)",
images: Array.from({length:36}, (_,i)=>`images/mist/m${i+1}.jpeg`)
}

}

const selected = propertyData[property]

title.innerText = selected.title

selected.images.forEach(img=>{
images.innerHTML += `<img src="${img}">`
})

function goBack(){

const params = new URLSearchParams(window.location.search)
const property = params.get("name")

window.location.href = "index.html?open=stayclub&property=" + property

}

</script>

</body>
</html>
